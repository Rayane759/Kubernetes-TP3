apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: hugosmn5/backend-3-tier:1.1
          ports:
            - containerPort: 5000
          env:
            - name: DB_USER
              value: "admin"
            - name: DB_PASS
              value: "password"
            - name: DB
              value: "reviews"
            - name: DB_HOST
              value: "postgres-service"